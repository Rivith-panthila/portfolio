<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <!-- Normalize -->
    <link rel="stylesheet" href="assets/normalize.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100..900&family=Italiana&display=swap" rel="stylesheet">

    <!-- Remix Icons -->

</head>

<body>

    <!-- ========== navigation bar========== -->
    <header class="header">
        <nav class="nav">
            <div class="container nav-container">
                <ul class="nav-list">
                    <li><a href="#" >Home</a></li>

    <section class="hero">

        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>

        <div class="container hero-container">

            <!-- glass effect eka -->
            <div class="hero-glass">

                    <!-- left content -->
                    <div class="hero-text">
                        <h1>
                            Hi, <br>
                            I'm <span>Rivith Panthila</span>

                        <div class="animated-text">

                            <button class="btn cv-btn">Download CV</button>
                            <button class="btn hire-btn">Hire Me</button>
                        </div>
                    </div>

                    <!-- image -->
                    <div class="hero-image">
                        <img src="assets/images/home image.png" alt="profile image">
                    </div>

                </div>

                <!-- marque -->
                <div class="marquee">
                    <div class="marquee-track">
                        <h1>Software Engineer  &  UI / UX Designer  </h1>
                        

                        
                    </div>
                </div>
